name: CI

on:
  push:
    branches: [master]
    tags: ['v*']
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # The Swift bridge in hardware-enclave targets arm64/x86_64-apple-macos14.0.
  MACOSX_DEPLOYMENT_TARGET: '14.0'

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: sudo apt-get update && sudo apt-get install -y libdbus-1-dev libtss2-dev pkg-config
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --check
      - run: cargo clippy --all-targets --all-features -- -D warnings

  build:
    strategy:
      fail-fast: false
      matrix:
        settings:
          - host: macos-latest
            target: aarch64-apple-darwin
          - host: macos-latest
            target: x86_64-apple-darwin
          - host: windows-latest
            target: x86_64-pc-windows-msvc
          - host: windows-latest
            target: aarch64-pc-windows-msvc
          # Native arm64 runner: the dbus system dependency rules out
          # cross-compiling the Linux targets.
          - host: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - host: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
    name: build ${{ matrix.settings.target }}
    runs-on: ${{ matrix.settings.host }}
    steps:
      - uses: actions/checkout@v4
      - if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libdbus-1-dev libtss2-dev pkg-config
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.settings.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.settings.target }}
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec napi build --platform --release --target ${{ matrix.settings.target }}
      - uses: actions/upload-artifact@v4
        with:
          name: bindings-${{ matrix.settings.target }}
          path: deviceid.*.node
          if-no-files-found: error

  # The only real backend a VM runner can host: the Linux keyring, against
  # an unlocked gnome-keyring inside a dbus session.
  test:
    needs: build
    strategy:
      fail-fast: false
      matrix:
        settings:
          - host: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - host: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
    name: test ${{ matrix.settings.target }}
    runs-on: ${{ matrix.settings.host }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - uses: actions/download-artifact@v4
        with:
          name: bindings-${{ matrix.settings.target }}
      - run: |
          sudo apt-get update && sudo apt-get install -y gnome-keyring dbus libdbus-1-3
          dbus-run-session -- bash -c 'eval "$(echo -n "" | gnome-keyring-daemon --unlock --components=secrets)"; pnpm test'

  # Hardware that cannot exist inside a VM runner (macOS Secure Enclave,
  # Windows TPM) is tested through the software mock backend — same napi
  # surface, same wire format. The real hardware paths are verified on
  # physical developer machines before release.
  test-mock:
    strategy:
      fail-fast: false
      matrix:
        host: [macos-latest, windows-latest, windows-11-arm]
    runs-on: ${{ matrix.host }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: mock-${{ matrix.host }}
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec napi build --platform --features mock
      - run: pnpm test
        env:
          ENCLAVEAPP_MOCK_STORAGE: '1'

  # Publishes on `v*` tags via npm trusted publishing (OIDC) — no token
  # secret. The very first release must be published manually to create the
  # packages before a trusted publisher can be configured on them.
  publish:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [lint, build, test, test-mock]
    runs-on: ubuntu-latest
    permissions:
      # prepublish creates the GitHub release; id-token feeds npm OIDC.
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Tag must match package.json version
        run: |
          test "${GITHUB_REF_NAME}" = "v$(node -p 'require("./package.json").version')"
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - run: pnpm exec napi create-npm-dirs
      - run: pnpm exec napi artifacts
      - name: Publish
        run: npm publish --access public
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
